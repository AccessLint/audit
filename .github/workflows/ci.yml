name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      # Fail the PR if dist/ wasn't regenerated. Standard pattern for
      # JS actions that commit their bundle.
      - name: Verify dist/ is up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "::error::dist/ is stale — run 'npm run build' and commit the result."
            git diff dist
            exit 1
          fi
