name: AccessLint Audit
description: Run a WCAG 2.2 accessibility audit against a live URL and emit JSON + Markdown reports with PR-diff annotations.
author: AccessLint
branding:
  icon: check-circle
  color: blue

inputs:
  url:
    description: "URL to audit. Examples: https://example.com, https://pr-123-myapp.preview.dev, http://localhost:3000."
    required: true
  wcag-level:
    description: "Conformance level. One of: A, AA, AAA. Default AA."
    default: "AA"
  min-impact:
    description: "Minimum impact level to include in the report. One of: critical, serious, moderate, minor. Default serious."
    default: "serious"
  fail-on:
    description: "Exit non-zero when the report contains violations at this level or worse. One of: never (default — composition-friendly), any, critical, serious, moderate, minor."
    default: "never"
  rules:
    description: "Allowlist — comma- or whitespace-separated rule IDs to run. Empty (default) runs every rule that passes wcag-level + rules-exclude."
    default: ""
  rules-exclude:
    description: "Denylist — comma- or whitespace-separated rule IDs to skip. Example: 'landmarks/region,navigable/bypass'."
    default: ""
  wait-for:
    description: "What to wait for after navigation. Examples: load, domcontentloaded, networkidle (default), or a CSS selector like '#app-ready'."
    default: "networkidle"
  auth-headers:
    # Avoid literal ${{ ... }} in this description — composite-action descriptions
    # are template-evaluated when the action loads.
    description: 'JSON object of HTTP headers for every request. Example shape: {"Authorization":"Bearer <token>","X-Vercel-Protection-Bypass":"<token>"}.'
    default: ""

outputs:
  violation-count:
    description: "Total violations after the min-impact filter."
    value: ${{ steps.audit.outputs.violation-count }}
  critical-count:
    description: "Number of critical-impact violations."
    value: ${{ steps.audit.outputs.critical-count }}
  serious-count:
    description: "Number of serious-impact violations."
    value: ${{ steps.audit.outputs.serious-count }}
  annotated-count:
    description: "How many violations had a workspace-relative source location and got an inline `::warning::` annotation."
    value: ${{ steps.audit.outputs.annotated-count }}
  failed:
    description: "'true' when violation-count is greater than zero, else 'false'. Independent of fail-on — fail-on controls the exit code; this output reports detection."
    value: ${{ steps.audit.outputs.failed }}
  report-json-path:
    description: "Path to the JSON report file."
    value: ${{ steps.audit.outputs.report-json-path }}
  report-markdown-path:
    description: "Path to the Markdown report file."
    value: ${{ steps.audit.outputs.report-markdown-path }}

runs:
  using: composite
  steps:
    - name: Install action dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev --no-audit --no-fund --silent

    - name: Install chromium-headless-shell
      # Always install — caching is the consumer's responsibility via
      # actions/cache on ~/.cache/ms-playwright (see README).
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npx --yes playwright install --only-shell chromium

    - name: Run audit
      id: audit
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_URL: ${{ inputs.url }}
        INPUT_WCAG-LEVEL: ${{ inputs.wcag-level }}
        INPUT_MIN-IMPACT: ${{ inputs.min-impact }}
        INPUT_FAIL-ON: ${{ inputs.fail-on }}
        INPUT_RULES: ${{ inputs.rules }}
        INPUT_RULES-EXCLUDE: ${{ inputs.rules-exclude }}
        INPUT_WAIT-FOR: ${{ inputs.wait-for }}
        INPUT_AUTH-HEADERS: ${{ inputs.auth-headers }}
      run: node dist/index.js
