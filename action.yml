name: AccessLint Audit
description: Run a WCAG 2.2 accessibility audit against a live URL and emit JSON + Markdown reports.
author: AccessLint
branding:
  icon: check-circle
  color: blue

inputs:
  url:
    description: "URL to audit. Examples: https://example.com, https://pr-123-myapp.preview.dev, http://localhost:3000."
    required: true
  wcag-level:
    description: "Conformance level. One of: A, AA, AAA. Default AA."
    default: "AA"
  min-impact:
    description: "Minimum impact level to include in the report. One of: critical, serious, moderate, minor. Default serious — drops moderate and minor from the output."
    default: "serious"
  wait-for:
    description: "What to wait for after navigation. Examples: load, domcontentloaded, networkidle (default), or a CSS selector like '#app-ready' / '[data-testid=\"shell-mounted\"]'."
    default: "networkidle"
  auth-headers:
    # Avoid literal ${{ ... }} in this description — composite-action descriptions
    # are template-evaluated when the action loads, and a fake expression breaks
    # every consumer with 'Unrecognized named-value'. The README has the full
    # example with secrets interpolation; here we describe the shape only.
    description: 'JSON object of HTTP headers for every request. Example shape: {"Authorization":"Bearer <token>","X-Vercel-Protection-Bypass":"<token>"}.'
    default: ""
  output-dir:
    description: "Where to write accesslint-report.{json,md}. Defaults to $GITHUB_WORKSPACE so downstream actions can pick the files up directly."
    default: ""
  install-browser:
    description: "Run 'playwright install --only-shell chromium' before auditing. Set 'false' if you've already cached and restored ~/.cache/ms-playwright in an earlier step. Default true."
    default: "true"

outputs:
  violation-count:
    description: "Total violations after the min-impact filter."
    value: ${{ steps.audit.outputs.violation-count }}
  critical-count:
    description: "Number of critical-impact violations."
    value: ${{ steps.audit.outputs.critical-count }}
  serious-count:
    description: "Number of serious-impact violations."
    value: ${{ steps.audit.outputs.serious-count }}
  failed:
    description: "'true' when violation-count is greater than zero, else 'false'."
    value: ${{ steps.audit.outputs.failed }}
  report-json-path:
    description: "Path to the JSON report file."
    value: ${{ steps.audit.outputs.report-json-path }}
  report-markdown-path:
    description: "Path to the Markdown report file."
    value: ${{ steps.audit.outputs.report-markdown-path }}

runs:
  using: composite
  steps:
    - name: Install action dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev --no-audit --no-fund --silent

    - name: Install chromium-headless-shell
      if: ${{ inputs.install-browser == 'true' }}
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npx --yes playwright install --only-shell chromium

    - name: Run audit
      id: audit
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_URL: ${{ inputs.url }}
        INPUT_WCAG-LEVEL: ${{ inputs.wcag-level }}
        INPUT_MIN-IMPACT: ${{ inputs.min-impact }}
        INPUT_WAIT-FOR: ${{ inputs.wait-for }}
        INPUT_AUTH-HEADERS: ${{ inputs.auth-headers }}
        INPUT_OUTPUT-DIR: ${{ inputs.output-dir }}
        # Browser install is handled by the composite step above; tell the
        # main entry not to attempt it again.
        INPUT_INSTALL-BROWSER: "false"
      run: node dist/index.js
